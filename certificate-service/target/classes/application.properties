# ==========================================
# Certificate Service Configuration
# ==========================================
server.port=8087
spring.application.name=certificate-service

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/certificate_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=learning_user
spring.datasource.password=learning_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Inter-Service URLs
services.student.url=http://localhost:8082
services.course.url=http://localhost:8083
services.instructor.url=http://localhost:8084

# Logging
logging.level.com.onlinelearning.certificate=DEBUG
